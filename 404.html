<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page Not Found | Saswat Residency</title>
<meta name="robots" content="noindex">
<link rel="icon" href="/favicon.ico" sizes="any">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">
<style>
  .notfound {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 24px;
    background: var(--color-primary);
    color: #fff;
  }
  .notfound h1 { font-size: clamp(60px, 12vw, 120px); color: var(--color-accent); margin-bottom: 0; }
  .notfound p { color: rgba(255,255,255,.8); max-width: 420px; margin: 12px 0 28px; }
</style>
</head>
<body>
  <div class="notfound">
    <h1>404</h1>
    <p>Sorry, we couldn't find that page. It may have moved, or the link may be outdated.</p>
    <a class="btn btn-primary" href="/">Back to Homepage</a>
  </div>
</body>
</html>
